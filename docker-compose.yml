services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:8080"
      - "8443:8443"
    environment:
      ALLOWED_ADMIN_IPS: ${ALLOWED_ADMIN_IPS:-127.0.0.1,::1}
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
      PMA_UPSTREAM_HOST: ${PMA_UPSTREAM_HOST:-phpmyadmin}
      PMA_UPSTREAM_PORT: ${PMA_UPSTREAM_PORT:-80}
    volumes:
      - nginx-logs:/var/log/nginx
      - ./certs:/etc/nginx/certs:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/default.conf.in:/etc/nginx/templates-manual/default.conf.in:ro
      - ./nginx/docker-entrypoint.d/15-geo.sh:/docker-entrypoint.d/15-geo.sh:ro
      - ./nginx/docker-entrypoint.d/22-render-default.sh:/docker-entrypoint.d/22-render-default.sh:ro
      - ./nginx/docker-entrypoint.d/zz-real-access-log.sh:/docker-entrypoint.d/zz-real-access-log.sh:ro
    depends_on:
      web1:
        condition: service_started
      web2:
        condition: service_started
      phpmyadmin:
        condition: service_started
    networks:
      - networking-net

  web1:
    build:
      context: ./app
      dockerfile: Dockerfile
    hostname: web1
    environment:
      DB_HOST: ${DB_HOST:-db-primary}
      DB_REPLICA_HOST: ${DB_REPLICA_HOST:-db-replica}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-appdb}
      DB_USER: ${DB_USER:-appuser}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_FROM: ${SMTP_FROM:-noreply@example.com}
      APP_BASE_URL: ${APP_BASE_URL:-https://localhost:8443}
    depends_on:
      db-primary:
        condition: service_healthy
      redis:
        condition: service_started
      mailpit:
        condition: service_started
    networks:
      - networking-net

  web2:
    build:
      context: ./app
      dockerfile: Dockerfile
    hostname: web2
    environment:
      DB_HOST: ${DB_HOST:-db-primary}
      DB_REPLICA_HOST: ${DB_REPLICA_HOST:-db-replica}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-appdb}
      DB_USER: ${DB_USER:-appuser}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_FROM: ${SMTP_FROM:-noreply@example.com}
      APP_BASE_URL: ${APP_BASE_URL:-https://localhost:8443}
    depends_on:
      db-primary:
        condition: service_healthy
      redis:
        condition: service_started
      mailpit:
        condition: service_started
    networks:
      - networking-net

  redis:
    image: redis:7-alpine
    networks:
      - networking-net

  goaccess:
    image: alpine:3.19
    depends_on:
      nginx:
        condition: service_started
    command:
      - /bin/sh
      - -c
      - |
        apk add --no-cache goaccess >/dev/null
        touch /var/log/nginx/goaccess.html
        while true; do
          goaccess /var/log/nginx/access.log -o /var/log/nginx/goaccess.html --log-format=COMBINED --no-progress || true
          sleep 15
        done
    volumes:
      - nginx-logs:/var/log/nginx
    networks:
      - networking-net

  db-primary:
    image: mariadb:11.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-appdb}
      MYSQL_USER: ${DB_USER:-appuser}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      REPL_PASSWORD: ${REPL_PASSWORD}
    volumes:
      - db-primary-data:/var/lib/mysql
      - ./mariadb/primary/conf.d:/etc/mysql/conf.d:ro
      - ./mariadb/primary/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 40s
    networks:
      - networking-net

  db-replica:
    image: mariadb:11.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - db-replica-data:/var/lib/mysql
      - ./mariadb/replica/conf.d:/etc/mysql/conf.d:ro
    depends_on:
      db-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 40s
    networks:
      - networking-net

  replica-setup:
    image: mariadb:11.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      REPL_PASSWORD: ${REPL_PASSWORD}
    volumes:
      - ./scripts/replica-init.sh:/replica-init.sh:ro
    entrypoint: ["/bin/bash", "/replica-init.sh"]
    depends_on:
      db-primary:
        condition: service_healthy
      db-replica:
        condition: service_healthy
    restart: "no"
    networks:
      - networking-net

  phpmyadmin:
    image: phpmyadmin:5-apache
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - ./phpmyadmin/config.user.inc.php:/etc/phpmyadmin/config.user.inc.php:ro
    depends_on:
      db-primary:
        condition: service_healthy
      db-replica:
        condition: service_healthy
    networks:
      - networking-net

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - networking-net

networks:
  networking-net:
    driver: bridge

volumes:
  nginx-logs:
  db-primary-data:
  db-replica-data:
